<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini AI Super Tools</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome for Icons (More stable than Lucide in CDN) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Generative AI SDK -->
    <script type="importmap">
      {
        "imports": {
          "@google/generative-ai": "https://esm.run/@google/generative-ai"
        }
      }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600;700&display=swap');
        
        body { 
            font-family: 'Hind Siliguri', sans-serif; 
            background-color: #0f172a;
            color: #e2e8f0;
        }

        /* Glass Effect */
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { GoogleGenerativeAI } from "@google/generative-ai";
        const { useState, useEffect, useRef } = React;

        // --- USER API KEY ---
        const DEFAULT_API_KEY = "AIzaSyCYCWM8SmsehBmYIbQr5995OIf_idQWJXA";

        // --- COMPONENTS ---

        // 1. Sidebar Button
        const MenuBtn = ({ icon, label, active, onClick }) => (
            <button 
                onClick={onClick}
                className={`w-full text-left px-6 py-4 flex items-center gap-3 transition-all duration-200 ${
                    active 
                    ? 'bg-gradient-to-r from-blue-600 to-blue-500 text-white shadow-lg border-r-4 border-white' 
                    : 'text-gray-400 hover:bg-gray-800 hover:text-white'
                }`}
            >
                <i className={`fa-solid ${icon} text-xl w-6 text-center`}></i>
                <span className="font-semibold text-lg">{label}</span>
            </button>
        );

        // 2. Chat Component
        const ChatBot = ({ apiKey, mode }) => {
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState("");
            const [loading, setLoading] = useState(false);
            const scrollRef = useRef(null);

            useEffect(() => {
                setMessages([]);
                if (mode === 'gf') {
                    setMessages([{ role: "model", text: "হাই জান! ❤️ কেমন আছো তুমি? আমাকে মিস করেছো?" }]);
                } else {
                    setMessages([{ role: "model", text: "নমস্কার! আমি Gemini AI, বলুন আপনাকে কীভাবে সাহায্য করতে পারি?" }]);
                }
            }, [mode]);

            const handleSend = async () => {
                if (!input || !apiKey) return;
                const userText = input;
                setMessages(prev => [...prev, { role: "user", text: userText }]);
                setInput("");
                setLoading(true);

                try {
                    const genAI = new GoogleGenerativeAI(apiKey);
                    const model = genAI.getGenerativeModel({ model: "gemini-pro" });
                    
                    let systemInstruction = mode === 'gf' 
                        ? "Act as a loving, slightly possessive girlfriend named Riya. Speak in Bengali mixed with English ('Banglish'). Use emojis like ❤️, 😘. Be short and sweet."
                        : "You are a helpful AI assistant. Reply in Bengali.";

                    const chat = model.startChat({
                        history: messages.map(m => ({
                            role: m.role === 'model' ? 'model' : 'user',
                            parts: [{ text: m.text }]
                        })),
                    });

                    const result = await chat.sendMessage(systemInstruction + "\nUser: " + userText);
                    const response = result.response.text();
                    
                    setMessages(prev => [...prev, { role: "model", text: response }]);
                } catch (error) {
                    setMessages(prev => [...prev, { role: "model", text: "API Error. Please check key." }]);
                }
                setLoading(false);
            };

            useEffect(() => scrollRef.current?.scrollIntoView({ behavior: "smooth" }), [messages]);

            return (
                <div className="flex flex-col h-[600px] glass rounded-xl overflow-hidden">
                    <div className={`p-4 flex items-center gap-3 ${mode === 'gf' ? 'bg-pink-600' : 'bg-blue-600'}`}>
                        <div className="w-10 h-10 rounded-full bg-white flex items-center justify-center text-xl">
                            {mode === 'gf' ? '👩‍❤️‍👨' : '🤖'}
                        </div>
                        <h3 className="font-bold text-white text-xl">{mode === 'gf' ? 'Riya (Girlfriend)' : 'Gemini Assistant'}</h3>
                    </div>

                    <div className="flex-1 overflow-y-auto p-4 space-y-4 bg-gray-900/50">
                        {messages.map((m, i) => (
                            <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                <div className={`max-w-[80%] px-4 py-2 rounded-2xl ${
                                    m.role === 'user' ? 'bg-blue-500 text-white rounded-tr-none' : 'bg-gray-700 text-gray-200 rounded-tl-none'
                                }`}>
                                    {m.text}
                                </div>
                            </div>
                        ))}
                        {loading && <div className="text-gray-400 ml-2">টাইপ করছে...</div>}
                        <div ref={scrollRef}></div>
                    </div>

                    <div className="p-4 bg-gray-800 flex gap-2">
                        <input 
                            value={input}
                            onChange={e => setInput(e.target.value)}
                            onKeyDown={e => e.key === 'Enter' && handleSend()}
                            className="flex-1 bg-gray-700 rounded-full px-5 py-3 outline-none text-white border border-gray-600 focus:border-blue-500"
                            placeholder="Type a message..."
                        />
                        <button onClick={handleSend} className="bg-blue-600 w-12 h-12 rounded-full hover:bg-blue-500 flex items-center justify-center text-white transition">
                            <i className="fa-solid fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
            );
        };

        // 3. Image Generator (Gemini)
        const ImageGen = ({ apiKey }) => {
            const [prompt, setPrompt] = useState("");
            const [image, setImage] = useState(null);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);

            const generateImage = async () => {
                if (!prompt) return;
                setLoading(true);
                setError(null);
                setImage(null);

                try {
                    // Using Imagen 3 endpoint via fetch directly
                    const response = await fetch(
                        `https://generativelanguage.googleapis.com/v1beta/models/imagen-3.0-generate-001:predict?key=${apiKey}`,
                        {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                instances: [{ prompt: prompt }],
                                parameters: { sampleCount: 1, aspectRatio: "1:1" }
                            })
                        }
                    );

                    const data = await response.json();
                    
                    if (data.error) {
                        throw new Error(data.error.message || "Permission Denied or Model Busy");
                    }

                    if (data.predictions && data.predictions[0]?.bytesBase64Encoded) {
                        setImage(`data:image/png;base64,${data.predictions[0].bytesBase64Encoded}`);
                    } else {
                        throw new Error("No image generated.");
                    }
                } catch (err) {
                    setError("Failed: আপনার API Key তে Imagen 3 এর এক্সেস নেই অথবা লিমিট শেষ।");
                    console.error(err);
                }
                setLoading(false);
            };

            return (
                <div className="glass p-8 rounded-xl text-center">
                    <h2 className="text-3xl font-bold mb-6 text-pink-400"><i className="fa-solid fa-wand-magic-sparkles"></i> Text to Image</h2>
                    
                    <div className="flex gap-2 max-w-xl mx-auto mb-8">
                        <input 
                            value={prompt}
                            onChange={e => setPrompt(e.target.value)}
                            className="flex-1 bg-gray-800 border border-gray-600 rounded-lg p-3 outline-none focus:border-pink-500"
                            placeholder="Describe image (e.g., A cat in space suit)"
                        />
                        <button 
                            onClick={generateImage}
                            disabled={loading}
                            className="bg-pink-600 hover:bg-pink-500 text-white px-6 py-3 rounded-lg font-bold"
                        >
                            {loading ? <span className="loader"></span> : "Create"}
                        </button>
                    </div>

                    {error && <div className="text-red-400 mb-4 bg-red-900/20 p-2 rounded inline-block">{error}</div>}

                    <div className="min-h-[300px] border-2 border-dashed border-gray-700 rounded-xl flex items-center justify-center bg-gray-900/50">
                        {image ? (
                            <img src={image} className="max-h-[400px] rounded shadow-2xl" alt="Generated" />
                        ) : (
                            <div className="text-gray-500">
                                <i className="fa-regular fa-image text-4xl mb-2"></i>
                                <p>No image generated yet</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // 4. Caption Generator
        const CaptionGen = ({ apiKey }) => {
            const [file, setFile] = useState(null);
            const [preview, setPreview] = useState(null);
            const [mood, setMood] = useState("Happy");
            const [caption, setCaption] = useState("");
            const [loading, setLoading] = useState(false);

            const handleFile = (e) => {
                const f = e.target.files[0];
                if (f) {
                    setFile(f);
                    setPreview(URL.createObjectURL(f));
                    setCaption("");
                }
            };

            const generateCaption = async () => {
                if (!file) return;
                setLoading(true);
                try {
                    const genAI = new GoogleGenerativeAI(apiKey);
                    const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

                    // Convert file to base64
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onloadend = async () => {
                        const base64Data = reader.result.split(',')[1];
                        
                        const prompt = `Write a short, engaging social media caption for this photo. Mood: ${mood}. Include emojis and hashtags. Language: Bengali mixed with English.`;
                        
                        const result = await model.generateContent([
                            prompt,
                            { inlineData: { data: base64Data, mimeType: file.type } }
                        ]);
                        
                        setCaption(result.response.text());
                        setLoading(false);
                    };
                } catch (e) {
                    setCaption("Error generating caption.");
                    setLoading(false);
                }
            };

            return (
                <div className="glass p-6 rounded-xl">
                    <h2 className="text-2xl font-bold mb-6 text-purple-400"><i className="fa-solid fa-camera"></i> AI Caption Generator</h2>
                    
                    <div className="grid md:grid-cols-2 gap-8">
                        <div className="border-2 border-dashed border-gray-600 rounded-xl h-64 flex items-center justify-center bg-gray-800 relative hover:border-purple-500 transition">
                            {preview ? <img src={preview} className="h-full object-contain" /> : <span className="text-gray-500">Click to Upload Image</span>}
                            <input type="file" onChange={handleFile} className="absolute inset-0 opacity-0 cursor-pointer" accept="image/*"/>
                        </div>

                        <div className="space-y-4">
                            <div>
                                <label className="block text-gray-400 mb-2">Mood:</label>
                                <div className="flex gap-2 flex-wrap">
                                    {['Happy', 'Sad', 'Attitude', 'Funny'].map(m => (
                                        <button key={m} onClick={() => setMood(m)} className={`px-4 py-1 rounded-full text-sm ${mood === m ? 'bg-purple-600' : 'bg-gray-700'}`}>{m}</button>
                                    ))}
                                </div>
                            </div>

                            <button onClick={generateCaption} disabled={loading || !file} className="w-full bg-purple-600 hover:bg-purple-500 py-2 rounded font-bold">
                                {loading ? "Generating..." : "Generate Caption"}
                            </button>

                            {caption && (
                                <div className="bg-gray-800 p-4 rounded border border-gray-700 mt-2">
                                    <p>{caption}</p>
                                    <button onClick={() => navigator.clipboard.writeText(caption)} className="mt-2 text-xs text-blue-400 hover:text-white">
                                        <i className="fa-regular fa-copy"></i> Copy
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // 5. Photo Studio (Filters & Templates)
        const PhotoStudio = () => {
            const [imgSrc, setImgSrc] = useState(null);
            const [filter, setFilter] = useState("");
            const [template, setTemplate] = useState("none");
            const canvasRef = useRef(null);

            const handleUpload = (e) => {
                if (e.target.files[0]) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        const img = new Image();
                        img.onload = () => setImgSrc(img);
                        img.src = ev.target.result;
                    };
                    reader.readAsDataURL(e.target.files[0]);
                }
            };

            useEffect(() => {
                if (!imgSrc || !canvasRef.current) return;
                const canvas = canvasRef.current;
                const ctx = canvas.getContext("2d");
                
                // Scale
                const scale = Math.min(500 / imgSrc.width, 1);
                canvas.width = imgSrc.width * scale;
                canvas.height = imgSrc.height * scale;

                // Draw Image with Filter
                ctx.filter = filter;
                ctx.drawImage(imgSrc, 0, 0, canvas.width, canvas.height);
                ctx.filter = "none";

                // Templates
                if (template === 'polaroid') {
                    ctx.strokeStyle = "#fff";
                    ctx.lineWidth = 40;
                    ctx.strokeRect(0,0, canvas.width, canvas.height);
                    ctx.fillStyle = "#fff";
                    ctx.fillRect(0, canvas.height - 60, canvas.width, 60);
                    ctx.fillStyle = "#000";
                    ctx.font = "20px Arial";
                    ctx.fillText("Sweet Memory", 25, canvas.height - 25);
                }
            }, [imgSrc, filter, template]);

            return (
                <div className="glass p-6 rounded-xl">
                    <h2 className="text-2xl font-bold mb-4 text-green-400"><i className="fa-solid fa-paintbrush"></i> Photo Studio</h2>
                    
                    <div className="grid md:grid-cols-2 gap-6">
                        <div className="bg-gray-900 rounded p-2 flex flex-col items-center">
                            {!imgSrc && (
                                <label className="cursor-pointer bg-gray-800 px-4 py-2 rounded text-gray-300">
                                    Upload Photo <input type="file" onChange={handleUpload} className="hidden"/>
                                </label>
                            )}
                            <canvas ref={canvasRef} className={`max-w-full ${!imgSrc ? 'hidden' : ''}`}></canvas>
                            {imgSrc && <button onClick={() => {
                                const link = document.createElement('a');
                                link.download = 'edited.png';
                                link.href = canvasRef.current.toDataURL();
                                link.click();
                            }} className="mt-2 text-green-400 text-sm">Download</button>}
                        </div>
                        
                        <div className="space-y-4">
                            <div>
                                <h4 className="font-bold text-gray-400">Enhance / Filters</h4>
                                <div className="flex gap-2 flex-wrap mt-1">
                                    <button onClick={() => setFilter("")} className="bg-gray-700 px-3 py-1 rounded text-sm">None</button>
                                    <button onClick={() => setFilter("contrast(1.2) brightness(1.1) saturate(1.2)")} className="bg-blue-600 px-3 py-1 rounded text-sm">Auto Enhance</button>
                                    <button onClick={() => setFilter("grayscale(100%)")} className="bg-gray-700 px-3 py-1 rounded text-sm">B&W</button>
                                </div>
                            </div>
                            <div>
                                <h4 className="font-bold text-gray-400">Templates</h4>
                                <div className="flex gap-2 flex-wrap mt-1">
                                    <button onClick={() => setTemplate("none")} className="bg-gray-700 px-3 py-1 rounded text-sm">None</button>
                                    <button onClick={() => setTemplate("polaroid")} className="bg-white text-black px-3 py-1 rounded text-sm">Polaroid Frame</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- MAIN APP ---
        const App = () => {
            const [tab, setTab] = useState('chat');
            const [apiKey, setApiKey] = useState(DEFAULT_API_KEY);

            return (
                <div className="flex flex-col md:flex-row min-h-screen max-w-6xl mx-auto md:p-8 p-4 gap-6">
                    {/* Sidebar */}
                    <div className="w-full md:w-72 glass rounded-2xl flex flex-col h-fit">
                        <div className="p-6 text-center border-b border-gray-700">
                            <h1 className="text-2xl font-bold bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent">Gemini AI Hub</h1>
                        </div>
                        <MenuBtn icon="fa-comment-dots" label="AI Chat" active={tab==='chat'} onClick={() => setTab('chat')} />
                        <MenuBtn icon="fa-heart" label="AI Girlfriend" active={tab==='gf'} onClick={() => setTab('gf')} />
                        <MenuBtn icon="fa-image" label="Text to Image" active={tab==='img'} onClick={() => setTab('img')} />
                        <MenuBtn icon="fa-camera" label="Caption Gen" active={tab==='cap'} onClick={() => setTab('cap')} />
                        <MenuBtn icon="fa-wand-magic" label="Photo Studio" active={tab==='edit'} onClick={() => setTab('edit')} />
                        
                        <div className="mt-auto p-4 border-t border-gray-700">
                            <input 
                                value={apiKey} 
                                onChange={e => setApiKey(e.target.value)}
                                className="w-full bg-gray-900 border border-gray-600 rounded p-2 text-xs text-gray-400"
                                placeholder="API Key"
                            />
                        </div>
                    </div>

                    {/* Content */}
                    <div className="flex-1">
                        {tab === 'chat' && <ChatBot apiKey={apiKey} mode="normal" />}
                        {tab === 'gf' && <ChatBot apiKey={apiKey} mode="gf" />}
                        {tab === 'img' && <ImageGen apiKey={apiKey} />}
                        {tab === 'cap' && <CaptionGen apiKey={apiKey} />}
                        {tab === 'edit' && <PhotoStudio />}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
